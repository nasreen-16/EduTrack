services:
  - type: web
    name: edutrack
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_DIR
        value: /data
    disk:
      name: edutrack-db
      mountPath: /data
      sizeGB: 1